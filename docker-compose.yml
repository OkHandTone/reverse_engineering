version: '3.7'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: inventory_api
    volumes:
      - .:/app
      - venv_data:/app/.venv
    ports:
      - 8000:8000
    env_file:
      - path: ./.env
        required: false
    environment:
      - SECRET_KEY=${SECRET_KEY:-django-insecure-default-key-change-me}
      - DEBUG=${DEBUG:-True}
      - DB_ENGINE=${DB_ENGINE:-sqlite}
      - POSTGRES_USER=${POSTGRES_USER:-admin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-admin}
      - POSTGRES_DB=${POSTGRES_DB:-admin}
      - POSTGRES_HOST=${POSTGRES_HOST:-inventory_db}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - DJANGO_SUPERUSER_USERNAME=${DJANGO_SUPERUSER_USERNAME:-admin}
      - DJANGO_SUPERUSER_PASSWORD=${DJANGO_SUPERUSER_PASSWORD:-change-me}
      - DJANGO_SUPERUSER_EMAIL=${DJANGO_SUPERUSER_EMAIL:-admin@example.com}
      - DJANGO_SUPERUSER_FIRST_NAME=${DJANGO_SUPERUSER_FIRST_NAME:-Admin}
      - DJANGO_SUPERUSER_LAST_NAME=${DJANGO_SUPERUSER_LAST_NAME:-Admin}
      - DJANGO_SUPERUSER_PHONE=${DJANGO_SUPERUSER_PHONE:-0000000000}
      - DJANGO_SUPERUSER_IDENTIFICATION_NUMBER=${DJANGO_SUPERUSER_IDENTIFICATION_NUMBER:-ADMIN0001}
    depends_on:
      - inventory_db

  inventory_db:
    image: postgres:16rc1-alpine3.18
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-admin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-admin}
      - POSTGRES_DB=${POSTGRES_DB:-admin}

volumes:
  postgres_data:
  venv_data:
