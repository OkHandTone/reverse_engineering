services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: inventory_api
    volumes:
      - .:/app
      - venv_data:/app/.venv
    ports:
      - 8000:8000
    env_file:
      - ./.env
    depends_on:
      - inventory_db

  inventory_db:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    env_file:
      - ./.env

volumes:
  postgres_data:
  venv_data:
