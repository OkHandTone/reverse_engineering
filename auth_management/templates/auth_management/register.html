<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - Inventory Management</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #f4f6f8;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }
        .card {
            background: #fff;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 420px;
        }
        h1 { margin: 0 0 0.5rem; font-size: 1.5rem; color: #1a1a1a; }
        p.subtitle { margin: 0 0 1.5rem; color: #666; font-size: 0.95rem; }
        label { display: block; margin-bottom: 0.35rem; font-weight: 600; color: #333; }
        input {
            width: 100%;
            padding: 0.75rem;
            margin-bottom: 1rem;
            border: 1px solid #d0d7de;
            border-radius: 8px;
            font-size: 1rem;
        }
        button {
            width: 100%;
            padding: 0.85rem;
            background: #2563eb;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }
        button:hover { background: #1d4ed8; }
        .error {
            background: #fef2f2;
            color: #b91c1c;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            border: 1px solid #fecaca;
        }
        .footer { margin-top: 1rem; text-align: center; font-size: 0.95rem; }
        a { color: #2563eb; text-decoration: none; font-weight: 600; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Inscription</h1>
        <p class="subtitle">Créer un compte client</p>

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <label for="username">Nom d'utilisateur</label>
            <input type="text" id="username" name="username" required autofocus>

            <label for="email">Email</label>
            <input type="email" id="email" name="email">

            <label for="password">Mot de passe</label>
            <input type="password" id="password" name="password" required minlength="8">

            <label for="first_name">Prénom</label>
            <input type="text" id="first_name" name="first_name" required>

            <label for="last_name">Nom</label>
            <input type="text" id="last_name" name="last_name" required>

            <label for="phone">Téléphone</label>
            <input type="text" id="phone" name="phone" required>

            <label for="identification_number">Numéro d'identification</label>
            <input type="text" id="identification_number" name="identification_number" required>

            <button type="submit">Créer mon compte</button>
        </form>

        <p class="footer">Déjà un compte ? <a href="{% url 'login_page' %}">Se connecter</a></p>
    </div>
</body>
</html>
